<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>乐享健康</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Leaflet地图库CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
</head>
<body>
    <!-- 主容器 -->
    <div id="app">
        <!-- 头部 -->
        <header class="header">
            <h1>🏃‍♂️ 乐享健康</h1>
            <p class="date" id="currentDate"></p>
        </header>

        <!-- 今日概览卡片 -->
        <section class="today-summary">
            <div class="summary-card">
                <div class="summary-item">
                    <span class="icon">📏</span>
                    <div class="data">
                        <span class="value" id="todayDistance">0.00</span>
                        <span class="unit">公里</span>
                    </div>
                    <span class="label">今日距离</span>
                </div>
                <div class="summary-item">
                    <span class="icon">🔥</span>
                    <div class="data">
                        <span class="value" id="todayCalories">0</span>
                        <span class="unit">千卡</span>
                    </div>
                    <span class="label">今日热量</span>
                </div>
                <div class="summary-item">
                    <span class="icon">⏱️</span>
                    <div class="data">
                        <span class="value" id="todayDuration">00:00</span>
                        <span class="unit"></span>
                    </div>
                    <span class="label">今日时长</span>
                </div>
            </div>
        </section>

        <!-- 运动类型选择 -->
        <section class="sport-types">
            <h2>选择运动类型</h2>
            <div class="type-grid">
                <button class="type-btn active" data-type="running">
                    <span class="type-icon">🏃</span>
                    <span class="type-name">跑步</span>
                </button>
                <button class="type-btn" data-type="walking">
                    <span class="type-icon">🚶</span>
                    <span class="type-name">快走</span>
                </button>
                <button class="type-btn" data-type="cycling">
                    <span class="type-icon">🚴</span>
                    <span class="type-name">骑行</span>
                </button>
                <button class="type-btn" data-type="strength">
                    <span class="type-icon">💪</span>
                    <span class="type-name">力量</span>
                </button>
                <button class="type-btn" data-type="housework">
                    <span class="type-icon">🧹</span>
                    <span class="type-name">家务</span>
                </button>
                <button class="type-btn" data-type="yoga">
                    <span class="type-icon">🧘</span>
                    <span class="type-name">瑜伽</span>
                </button>
            </div>
        </section>

        <!-- 运动记录表单 -->
        <section class="record-section">
            <h2>记录运动</h2>
            <form id="recordForm" class="record-form">
                <div class="form-group">
                    <label>距离 (公里)</label>
                    <input type="number" id="distance" step="0.01" min="0" placeholder="0.00" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>时长 (分钟)</label>
                        <input type="number" id="duration" min="1" placeholder="0" required>
                    </div>
                    <div class="form-group">
                        <label>平均心率 (次/分)</label>
                        <input type="number" id="heartRate" min="40" max="220" placeholder="可选">
                    </div>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="notes" placeholder="可选：记录运动感受">
                </div>
                <button type="submit" class="btn-primary">
                    <span class="btn-icon">✓</span>
                    保存记录
                </button>
            </form>
        </section>

        <!-- 快速计时器 -->
        <section class="timer-section">
            <h2>运动计时</h2>
            <div class="timer-display">
                <span id="timer">00:00:00</span>
            </div>
            <div class="timer-controls">
                <button id="startTimer" class="btn-timer start">▶ 开始</button>
                <button id="pauseTimer" class="btn-timer pause" disabled>⏸ 暂停</button>
                <button id="resetTimer" class="btn-timer reset">↺ 重置</button>
            </div>
        </section>

        <!-- 历史记录 -->
        <section class="history-section">
            <div class="section-header">
                <h2>历史记录</h2>
                <select id="filterType">
                    <option value="all">全部</option>
                    <option value="running">跑步</option>
                    <option value="walking">快走</option>
                    <option value="cycling">骑行</option>
                    <option value="strength">力量</option>
                    <option value="housework">家务</option>
                    <option value="yoga">瑜伽</option>
                </select>
            </div>
            <div id="recordsList" class="records-list">
                <!-- 记录将动态插入这里 -->
            </div>
        </section>

        <!-- 统计图表 -->
        <section class="chart-section">
            <h2>本周统计</h2>
            <div class="chart-tabs">
                <button class="chart-tab active" data-chart="distance">距离</button>
                <button class="chart-tab" data-chart="calories">热量</button>
                <button class="chart-tab" data-chart="duration">时长</button>
            </div>
            <div class="chart-container">
                <canvas id="weeklyChart"></canvas>
            </div>
        </section>

        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">首页</span>
            </button>
            <button class="nav-btn" data-page="map">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label">地图</span>
            </button>
            <button class="nav-btn" data-page="stats">
                <span class="nav-icon">📊</span>
                <span class="nav-label">统计</span>
            </button>
            <button class="nav-btn" data-page="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">设置</span>
            </button>
        </nav>
    </div>

    <!-- 统计页面 -->
    <div id="statsPage" class="page hidden">
        <header class="header">
            <h1>📊 运动统计</h1>
        </header>
        <section class="stats-overview">
            <div class="stat-card">
                <h3>本周运动</h3>
                <div class="stat-value" id="weekCount">0 次</div>
            </div>
            <div class="stat-card">
                <h3>本月运动</h3>
                <div class="stat-value" id="monthCount">0 次</div>
            </div>
            <div class="stat-card">
                <h3>总运动次数</h3>
                <div class="stat-value" id="totalCount">0 次</div>
            </div>
        </section>
        <section class="stats-detail">
            <h2>运动类型分布</h2>
            <div id="typeDistribution" class="distribution-chart">
                <!-- 动态生成 -->
            </div>
        </section>
        
        <section class="stats-detail">
            <h2>目标进度</h2>
            <div id="goalProgress" class="goal-progress-section">
                <!-- 动态生成 -->
            </div>
        </section>
        
        <section class="stats-detail">
            <h2>用户比较</h2>
            <div id="userComparison" class="user-comparison-section">
                <!-- 动态生成 -->
            </div>
        </section>
        
        <button class="btn-back" onclick="showPage('home')">← 返回首页</button>
    </div>

    <!-- 设置页面 -->
    <div id="settingsPage" class="page hidden">
        <header class="header">
            <h1>⚙️ 设置</h1>
        </header>
        <section class="settings-section">
            <!-- 当前用户信息 -->
            <div class="user-info">
                <h3>当前用户</h3>
                <div id="currentUserInfo" class="current-user">
                    加载中...
                </div>
            </div>
            
            <!-- 用户管理 -->
            <div class="user-management">
                <h3>用户管理 (最多20人)</h3>
                <div id="usersList" class="users-list">
                    <!-- 用户列表动态生成 -->
                </div>
                <button class="btn-primary" onclick="showAddUserForm()">添加新用户</button>
            </div>
            
            <!-- 添加用户表单 (默认隐藏) -->
            <div id="addUserForm" class="add-user-form hidden">
                <h3>添加新用户</h3>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="newUserName" placeholder="请输入用户名">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>体重 (kg)</label>
                        <input type="number" id="newUserWeight" value="65" min="30" max="200">
                    </div>
                    <div class="form-group">
                        <label>年龄</label>
                        <input type="number" id="newUserAge" value="25" min="10" max="100">
                    </div>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="newUserGender">
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="addUser()">添加用户</button>
                <button class="btn-secondary" onclick="hideAddUserForm()">取消</button>
            </div>
            
            <hr>
            
            <!-- 目标设置 -->
            <div class="goal-settings">
                <h3>运动目标</h3>
                <div id="goalsList" class="goals-list">
                    <!-- 目标列表动态生成 -->
                </div>
                <button class="btn-primary" onclick="showAddGoalForm()">添加新目标</button>
                
                <!-- 添加目标表单 -->
                <div id="addGoalForm" class="add-goal-form hidden">
                    <h4>添加运动目标</h4>
                    <div class="form-group">
                        <label>目标类型</label>
                        <select id="goalType">
                            <option value="daily">每日</option>
                            <option value="weekly">每周</option>
                            <option value="monthly">每月</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>目标指标</label>
                        <select id="goalMetric">
                            <option value="distance">距离</option>
                            <option value="duration">时长</option>
                            <option value="calories">热量</option>
                            <option value="steps">步数</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>目标值</label>
                        <input type="number" id="goalTarget" min="1" max="1000" value="5">
                    </div>
                    <div class="form-group">
                        <label>单位</label>
                        <input type="text" id="goalUnit" value="km" readonly>
                    </div>
                    <button class="btn-primary" onclick="addGoal()">添加目标</button>
                    <button class="btn-secondary" onclick="hideAddGoalForm()">取消</button>
                </div>
            </div>
            
            <hr>
            
            <!-- 个人设置 -->
            <div class="personal-settings">
                <h3>个人设置</h3>
                <div class="setting-item">
                    <label>体重 (kg)</label>
                    <input type="number" id="userWeight" value="70" min="30" max="200">
                </div>
                <div class="setting-item">
                    <label>年龄</label>
                    <input type="number" id="userAge" value="30" min="10" max="100">
                </div>
                <div class="setting-item">
                    <label>性别</label>
                    <select id="userGender">
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="saveSettings()">保存设置</button>
                <button class="btn-danger" onclick="clearAllData()">清除所有数据</button>
            </div>
        </section>
        <button class="btn-back" onclick="showPage('home')">← 返回首页</button>
    </div>

    <!-- 地图页面 -->
    <div id="mapPage" class="page hidden">
        <header class="header">
            <h1>🗺️ 运动足迹</h1>
        </header>
        <section class="map-section">
            <div class="map-controls">
                <button class="btn-primary" onclick="startTracking()">开始记录轨迹</button>
                <button class="btn-secondary" onclick="stopTracking()">停止记录</button>
                <button class="btn-secondary" onclick="clearTrack()">清除轨迹</button>
            </div>
            <div id="map" class="map-container"></div>
            <div class="track-info">
                <p>已记录 <span id="trackPoints">0</span> 个轨迹点</p>
                <p>当前状态：<span id="trackingStatus">未记录</span></p>
            </div>
            <div class="saved-tracks">
                <h3>历史足迹</h3>
                <div id="tracksList" class="tracks-list">
                    <!-- 轨迹列表动态生成 -->
                </div>
            </div>
        </section>
        <button class="btn-back" onclick="showPage('home')">← 返回首页</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet地图库JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
